apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: s3-credentials
  namespace: demo-ai
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: demo/s3-credentials
        property: aws-access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: demo/s3-credentials
        property: aws-secret-access-key
    - secretKey: BUCKET
      remoteRef:
        key: demo/s3-credentials
        property: bucket
    - secretKey: REGION
      remoteRef:
        key: demo/s3-credentials
        property: region
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: demo/s3-credentials
        property: endpoint
---
apiVersion: external-secrets.io/v1beta1
