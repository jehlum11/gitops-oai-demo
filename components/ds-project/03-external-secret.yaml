apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: team-alpha-s3
  namespace: team-alpha-ai
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: team-alpha-s3
    creationPolicy: Owner
    template:
      metadata:
        labels:
          opendatahub.io/dashboard: "true"
          opendatahub.io/managed: "true"
        annotations:
          opendatahub.io/connection-type: s3
          openshift.io/display-name: "S3 Model Storage (from Vault)"
      data:
        AWS_ACCESS_KEY_ID: "{{ .accessKey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secretKey }}"
        AWS_S3_BUCKET: "{{ .bucket }}"
        AWS_DEFAULT_REGION: "{{ .region }}"
        AWS_S3_ENDPOINT: "{{ .endpoint }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: demo/s3-credentials
        property: aws-access-key-id
    - secretKey: secretKey
      remoteRef:
        key: demo/s3-credentials
        property: aws-secret-access-key
    - secretKey: bucket
      remoteRef:
        key: demo/s3-credentials
        property: bucket
    - secretKey: region
      remoteRef:
        key: demo/s3-credentials
        property: region
    - secretKey: endpoint
      remoteRef:
        key: demo/s3-credentials
        property: endpoint
