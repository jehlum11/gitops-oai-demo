apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ds-project-team-alpha
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/jehlum11/gitops-oai-demo.git
    targetRevision: main
    path: components/ds-project
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
