apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oai-config
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/jehlum11/gitops-oai-demo.git
    targetRevision: main
    path: components/oai-config
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
