apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-secrets
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/jehlum11/gitops-oai-demo.git
    targetRevision: main
    path: components/eso-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
